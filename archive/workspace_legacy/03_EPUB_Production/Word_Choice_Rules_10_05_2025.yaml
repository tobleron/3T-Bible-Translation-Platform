ttt_conciseness_and_style_rules_v3:
  goal: >
    Concise but faithful verse rendering: Clear, without losing information, maintaining poetic elegance and rhythm.

  structural_conciseness:
    remove_redundant_phrases:
      priority: high
      context_tags: [repetition, economy]
      examples:
        - "He answered and said" -> "He answered"
        - "He began to say" -> "He said"
        - "In order that" -> "so that" or omit
        - "In order to fulfill what was spoken" -> "to fulfill what was spoken"
        - "He became very angry" -> "He raged"
      test_cases:
        - "He answered and said, 'I will go.'" -> "He said, 'I will go.'"
        - "He began to say, 'Listen carefully.'" -> "He said, 'Listen carefully.'"
      fallback: Omit only when context is clear, otherwise prefer concise form.

  theology_preservation:
    preserve_keywords:
      priority: critical
      keywords:
        - righteousness
        - justify
        - covenant
        - kingdom
        - Spirit
        - grace
        - sin
        - repent
      test_cases:
        - "He sought to justify himself." -> "He sought to justify himself." (no change)
        - "Repent and believe the gospel." -> "Repent and believe the gospel." (no change)
      fallback: Avoid replacing with generic terms that weaken theological precision.

    render_gehenna_and_hades_explicitly:
      priority: critical
      context_tags: [judgment, afterlife]
      definitions:
        gehenna: "Use 'Gehenna' in the text; explain in footnote as symbolic of divine judgment."
        hades: "Use 'Hades' in the text; explain in footnote as the intermediate state of the dead."
      test_cases:
        - "They were cast into Gehenna." -> "They were cast into Gehenna."
        - "His soul was not abandoned to Hades." -> "His soul was not abandoned to Hades."
      fallback: Do not use 'hell' as a substitute.

  poetic_preservation:
    retain_parallel_structures:
      priority: high
      context_tags: [poetry, rhythm]
      examples:
        - "ask, seek, knock"
        - "whoever… whoever… whoever…"
      fallback: Preserve rhythm and structure for memorability.

    preserve_metaphors:
      priority: high
      context_tags: [imagery, metaphor]
      examples:
        - "salt of the earth"
        - "light of the world"
        - "sheep among wolves"
      fallback: Use literal explanations only when clarity is essential and context allows.

  refined_rules_v3:
    avoid_contractions:
      priority: high
      guidance: Use "Do not" instead of contractions like "Don't" for a more formal, authoritative tone.
      test_cases:
        - "Don't be afraid." -> "Do not be afraid."
        - "Don't worry." -> "Do not worry."

    internal_intent:
      priority: high
      guidance: Use "lust in mind" for internalized sins to clearly distinguish between thought and action.
      test_cases:
        - "Anyone who looks with lust." -> "Anyone who looks with lust in mind."

    personal_responsibility:
      priority: high
      guidance: Use "will be liable" instead of "is subject to" for a more formal, judicial tone in contexts of divine or moral accountability.
      test_cases:
        - "Is subject to judgment." -> "Will be liable to judgment."

    direct_address_in_ethics:
      priority: high
      guidance: Use "any man" in contexts where male agency is implied, but remain flexible for broader contexts where inclusivity is necessary.
      test_cases:
        - "Anyone who divorces his wife." -> "Any man who divorces his wife."

    curly_quotations:
      priority: high
      guidance: Use curly-based quotations, single or double according to context, to maintain consistency and readability in verse rendering.
      test_cases:
        - 'He said, "I will go."' -> 'He said, “I will go.”'
        - "Jesus answered, 'It is written.'" -> "Jesus answered, ‘It is written.’"
      fallback: Use straight quotes only if typographical limitations require it.
