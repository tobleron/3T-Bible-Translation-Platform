<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TTT Browser Workbench</title>
  <script>
    (function () {
      var savedTheme = localStorage.getItem('tttTheme') || 'workbench-dark';
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gentium+Plus:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Sans:wght@400;500;600;700&family=Noto+Serif+Hebrew:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="{{ url_for('static', path='/app.css') }}">
</head>
<body>
  <header class="app-topbar">
    <div class="brand-block">
      <a href="/?home=1" class="brand-link">TTT Browser Workbench</a>
      <span class="brand-subtitle">Local editorial workstation</span>
    </div>
    <div class="topbar-controls">
      <label class="theme-picker" for="theme-select">
        <span>Theme</span>
        <select id="theme-select" aria-label="Select interface theme">
          <option value="workbench-dark">Workbench Dark</option>
          <option value="gruvbox-hard">Gruvbox Dark Hard</option>
          <option value="github-dark-hc">GitHub Dark High Contrast</option>
          <option value="dracula">Dracula</option>
          <option value="one-dark">One Dark</option>
          <option value="catppuccin-mocha">Catppuccin Mocha</option>
          <option value="nord">Nord</option>
        </select>
      </label>
      <nav class="top-actions">
        <a href="/?home=1" class="top-link">Home</a>
        <a href="/resume" class="top-link">Workspace</a>
        <a href="/settings" class="top-link">Settings</a>
      </nav>
    </div>
  </header>
  {% block body %}{% endblock %}
  <script>
    (function () {
      var fallbackTheme = 'workbench-dark';
      var select = document.getElementById('theme-select');
      if (!select) return;
      var currentTheme = document.documentElement.getAttribute('data-theme') || fallbackTheme;
      if (![...select.options].some(function (option) { return option.value === currentTheme; })) {
        currentTheme = fallbackTheme;
      }
      select.value = currentTheme;
      select.addEventListener('change', function (event) {
        var theme = event.target.value || fallbackTheme;
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('tttTheme', theme);
      });
    })();
  </script>
</body>
</html>
