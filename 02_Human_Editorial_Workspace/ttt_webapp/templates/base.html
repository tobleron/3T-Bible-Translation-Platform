<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TTT Browser Workbench</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gentium+Plus:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Sans:wght@400;500;600;700&family=Noto+Serif+Hebrew:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="{{ url_for('static', path='/app.css') }}">
</head>
<body>
  <header class="app-topbar">
    <div class="brand-block">
      <a href="/" class="brand-link">TTT Browser Workbench</a>
      <span class="brand-subtitle">Local editorial workstation</span>
    </div>
    <nav class="top-actions">
      <a href="/" class="top-link">Home</a>
      <a href="/resume" class="top-link">Workspace</a>
      <a href="/settings" class="top-link">Settings</a>
    </nav>
  </header>
  {% block body %}{% endblock %}
</body>
</html>
