# ------------------ Directory Settings ------------------
# The folder where all chat session folders will be stored.
sessions_directory: "sessions"

# The folder where you will store your static prompt files.
static_prompts_directory: "static_prompts"

# The folder where responses saved with the /save command will be stored.
saved_responses_directory: "saved_responses"

# Cleanup
cleanup_temp_files: true

# ------------------ UI Color Settings ------------------
# You can use standard color names (e.g., "red", "green", "blue", "yellow", "magenta", "cyan")
# Full list: https://rich.readthedocs.io/en/latest/appendix/colors.html

# Color for your input prompts and text.
user_color: "yellow"

# Color for the AI's response panel border.
ai_panel_color: "bright_green"

# Color for system messages indicating success.
success_color: "green"

# Color for system messages indicating an error or deletion.
error_color: "red"

# Color for general informational messages.
info_color: "yellow"

# Color for the horizontal rule that separates turns.
rule_color: "grey50"

